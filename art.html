<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameron Halaby | Art</title>
    
    <link rel="icon" href="./assets/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-grad-1: rgb(2, 1, 10);
            --bg-grad-2: rgb(10, 17, 40);
            --text-color: #f4f4f5; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100vw; min-height: 100vh; 
            background-color: transparent; 
            font-family: 'Archivo', sans-serif; color: var(--text-color); 
            -webkit-font-smoothing: antialiased; overflow-x: hidden; 
        }

        /* 1. DYNAMIC THEME GRADIENT BACKGROUND */
        .gradient-bg {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            transition: background 2s ease;
        }

        /* 2. CONTINUOUS NCA ORGANISM BACKGROUND */
        .nca-bg-canvas {
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            z-index: -1; opacity: 0.8; pointer-events: none;
            mix-blend-mode: screen;
        }

        /* NAVIGATION */
        .site-header { position: fixed; top: 0; width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; pointer-events: none; }
        .header-logo, .header-nav-link { pointer-events: auto; text-decoration: none; font-family: 'Archivo', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; color: #ffffff; mix-blend-mode: difference; transition: opacity 0.3s; }
        .header-nav-link:hover, .header-logo:hover { opacity: 0.5; }
        .header-nav { display: flex; gap: 40px; }

        /* PAGE LAYOUT */
        .page-section { padding: 80px 10%; }
        .hero-title-area { padding: 150px 10% 20px 10%; pointer-events: none; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 500; margin-bottom: 10px; color: var(--text-color); transition: color 2s ease; }
        .section-subtitle { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 60px; color: var(--text-color); transition: color 2s ease; }

        /* PHOTOS GALLERY */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .obs-card { background: linear-gradient(145deg, rgba(43,43,46,0.8) 0%, rgba(22,22,24,0.8) 100%); backdrop-filter: blur(10px); border-radius: 18px; position: relative; box-shadow: 0 35px 65px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.2); transform-style: preserve-3d; transition: transform 0.2s ease-out; }
        .obs-card::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 165, 0, 0.7), transparent); box-shadow: 0 2px 12px rgba(255, 165, 0, 0.5); z-index: 2; }
        
        .photo-card { cursor: pointer; padding: 15px; }
        .photo-wrapper { position: relative; width: 100%; border-radius: 8px; overflow: hidden; transform: translateZ(20px); background: #000; }
        .photo-img { width: 100%; height: 250px; object-fit: cover; display: block; transition: transform 0.5s ease, opacity 0.5s ease; opacity: 0.85; }
        .photo-card:hover .photo-img { transform: scale(1.05); opacity: 1; }
        
        .squiggle-left, .squiggle-right { position: absolute; top: 0; bottom: 0; width: 12px; background-image: url("data:image/svg+xml,%3Csvg width='12' height='30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6,0 Q12,7.5 6,15 T6,30' fill='none' stroke='rgba(255,255,255,0.8)' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: repeat-y; opacity: 0; transition: opacity 0.3s ease; z-index: 10; }
        .squiggle-left { left: 10px; animation: squiggleMove 1.5s linear infinite; }
        .squiggle-right { right: 10px; animation: squiggleMove 1.5s linear infinite reverse; }
        .photo-card:hover .squiggle-left, .photo-card:hover .squiggle-right { opacity: 1; }
        @keyframes squiggleMove { from { background-position: 0 0; } to { background-position: 0 30px; } }

        /* LIGHTBOX */
        .lightbox { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 3000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; padding: 55px; }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        .lightbox-close { position: absolute; top: 30px; right: 40px; color: #fff; font-size: 2.5rem; cursor: pointer; transition: transform 0.2s ease; z-index: 3001; }
        .lightbox-close:hover { transform: scale(1.2); }

        /* ADVANCED DRAWING EDITOR */
        .editor-wrapper { display: flex; flex-direction: column; gap: 15px; background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(25px); padding: 30px; border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); position: relative; z-index: 10; border: 1px solid rgba(255,255,255,0.05); }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 25px; align-items: center; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tool-group { display: flex; gap: 10px; align-items: center; }
        .tool-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-right: 5px; }
        
        .color-picker-input { -webkit-appearance: none; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; background: transparent; padding: 0; }
        .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker-input::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }

        .size-slider-input { -webkit-appearance: none; width: 120px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; cursor: pointer; }
        .size-slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; }

        .style-btn { font-family: 'Archivo', sans-serif; font-size: 0.7rem; text-transform: uppercase; padding: 8px 14px; background: rgba(255,255,255,0.05); border-radius: 4px; color: #aaa; cursor: pointer; border: 1px solid transparent; transition: 0.2s; letter-spacing: 1px; }
        .style-btn.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); }

        /* Canvas Overlay Structure */
        .canvas-container { position: relative; width: 100%; height: 500px; border-radius: 8px; overflow: hidden; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); }
        .draw-canvas { background: #000; cursor: crosshair; width: 100%; height: 100%; }
        .canvas-noise-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0.15; mix-blend-mode: screen; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); z-index: 5; }
        
        .editor-controls { display: flex; gap: 15px; margin-top: 5px; flex-wrap: wrap; }
        .action-btn { font-family: 'Archivo', sans-serif; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; color: #fff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; text-decoration: none; font-weight: 500; }
        .action-btn:hover { background: #fff; color: #000; }
        .action-btn.accent { background: linear-gradient(135deg, #f97316, #e11d48); border-color: transparent; }
        .action-btn.accent:hover { opacity: 0.9; color: #fff; box-shadow: 0 0 20px rgba(225, 29, 72, 0.5); }

        .site-footer { position: relative; z-index: 10; border-top: 1px solid rgba(128,128,128,0.2); opacity: 0.6; padding: 40px 10%; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-color); transition: color 2s ease; }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>
    <canvas class="nca-bg-canvas" id="nca-bg-canvas"></canvas>

    <nav class="site-header">
        <a href="index.html" class="header-logo">C. Halaby</a>
        <div class="header-nav">
            <a href="projects.html" class="header-nav-link">Projects</a>
            <a href="art.html" class="header-nav-link" style="opacity: 0.5;">Art</a>
            <a href="music.html" class="header-nav-link">Music</a>
        </div>
    </nav>

    <main>
        <div class="hero-title-area">
            <h1 class="section-title">Art</h1>
            <p class="section-subtitle">Original Art</p>
        </div>

        <!-- Gallery Section -->
        <section class="page-section" id="photos">
            <div class="card-grid">
                <div class="obs-card photo-card" onclick="openLightbox('./assets/ar1.JPG')"><div class="photo-wrapper"><div class="squiggle-left"></div><div class="squiggle-right"></div><img src="./assets/ar1.JPG" class="photo-img"></div></div>
                <div class="obs-card photo-card" onclick="openLightbox('./assets/ar2.JPG')"><div class="photo-wrapper"><div class="squiggle-left"></div><div class="squiggle-right"></div><img src="./assets/ar2.JPG" class="photo-img"></div></div>
                <div class="obs-card photo-card" onclick="openLightbox('./assets/ar3.JPG')"><div class="photo-wrapper"><div class="squiggle-left"></div><div class="squiggle-right"></div><img src="./assets/ar3.JPG" class="photo-img"></div></div>
                <div class="obs-card photo-card" onclick="openLightbox('./assets/ar4.JPG')"><div class="photo-wrapper"><div class="squiggle-left"></div><div class="squiggle-right"></div><img src="./assets/ar4.JPG" class="photo-img"></div></div>
                <div class="obs-card photo-card" onclick="openLightbox('./assets/ar5.JPG')"><div class="photo-wrapper"><div class="squiggle-left"></div><div class="squiggle-right"></div><img src="./assets/ar5.JPG" class="photo-img"></div></div>
                <div class="obs-card photo-card" onclick="openLightbox('./assets/ar6.JPG')"><div class="photo-wrapper"><div class="squiggle-left"></div><div class="squiggle-right"></div><img src="./assets/ar6.JPG" class="photo-img"></div></div>

        </section>

        <section class="page-section" style="padding-top: 40px;">
            <div class="section-header">
                <a href="https://cara.app/cameornh" class="section-subtitle" style="width: 300px; padding-right: 40px;">
                    <h3 class="section-subtitle">More on Cara</h3>
                </a>
            </div>
        </section>

        <!-- Advanced Drawing Editor Section -->
        <section class="page-section">
            <div class="section-header">
                <h2 class="section-title">Draw me a picture</h2>
                <p class="section-subtitle">Make your own art and send it to me</p>
            </div>
            <div class="editor-wrapper">
                <div class="toolbar">
                    <div class="tool-group">

                    </div>
                    <div class="tool-group" style="margin-left: 20px;">
                        <span class="tool-label">Tool:</span>
                        <button class="style-btn active" data-style="paintbrush">Paintbrush</button>
                        <button class="style-btn" data-style="marker">Marker</button>
                        <button class="style-btn" data-style="pencil">Pencil</button>
                        <button class="style-btn" data-style="airbrush">Airbrush</button>
                        <button class="style-btn" data-style="eraser" style="margin-left: 10px; border-color: rgba(255,255,255,0.3);">Eraser</button>
                    </div>

                <div class="canvas-container">
                    <canvas class="draw-canvas" id="draw-canvas"></canvas>

                <div class="editor-controls">
                    <button class="action-btn accent" id="btn-diffusion">Generate Img2Img</button>
                    <button class="action-btn" id="btn-clear">Clear</button>
                    <button class="action-btn" id="btn-download">Download Image</button>
                    <a href="mailto:crhalaby652@gmail.com?subject=My%20Artwork&body=Hi%20Cameron,%0D%0A%0D%0AI%20created%20a%20picture%20on%20your%20site%20and%20wanted%20to%20share%20it%0D%0A%0D%0A%7BDownload%20and%20Attatch%20File%20from%20Website%7D%0D%0A%0D%0AThanks" class="action-btn" style="margin-left: auto;">Send Art</a>
                </div>
            </div>
        </section>

    </main>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" onclick="event.stopPropagation()">
    </div>

    <footer class="site-footer">
        <p>2026 Cameron Halaby. No Rights Reserved.</p>
        <p id="dynamic-date"></p>
    </footer>

    <script>
        // ADD YOUR STABILITY AI API KEY HERE TO ENABLE IMG2IMG GENERATION
        const STABILITY_API_KEY = "sk-XALkbz2ANvymVnLma5czIhQbzH5CNDDskqJnnKdQL2VRrq7j";

        // DYNAMIC THEME (DAY/NIGHT)
        function updateTheme() {
            const d = new Date();
            const h = d.getHours() + (d.getMinutes() / 60);
            const intensity = (Math.cos((h - 12) / 24 * Math.PI * 2) + 1) / 2;
            
            const r1 = Math.round(2 + (26 - 2) * intensity);
            const g1 = Math.round(1 + (5 - 1) * intensity);
            const b1 = Math.round(10 + (0 - 10) * intensity);

            const r2 = Math.round(10 + (58 - 10) * intensity);
            const g2 = Math.round(17 + (18 - 17) * intensity);
            const b2 = Math.round(40 + (0 - 40) * intensity);

            const textR = Math.round(255 + (240 - 255) * intensity);
            const textG = Math.round(255 + (230 - 255) * intensity);
            const textB = Math.round(255 + (220 - 255) * intensity);

            document.documentElement.style.setProperty('--bg-grad-1', 'rgb(' + r1 + ',' + g1 + ',' + b1 + ')');
            document.documentElement.style.setProperty('--bg-grad-2', 'rgb(' + r2 + ',' + g2 + ',' + b2 + ')');
            document.documentElement.style.setProperty('--text-color', 'rgb(' + textR + ',' + textG + ',' + textB + ')');
        }
        setInterval(updateTheme, 60000); updateTheme();

        const dObj = new Date();
        const monthNames = new Array("Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec");
        document.getElementById('dynamic-date').innerText = 'Updated ' + Reflect.get(monthNames, dObj.getMonth()) + ' ' + dObj.getFullYear();

        // 3D CARD TILT
        const obsCards = document.querySelectorAll('.obs-card');
        for (let i = 0; i < obsCards.length; i++) {
            const c = Reflect.get(obsCards, i);
            c.addEventListener('mousemove', e => {
                const r = c.getBoundingClientRect();
                const x = e.clientX - r.left;
                const y = e.clientY - r.top;
                const cx = r.width / 2;
                const cy = r.height / 2;
                c.style.transform = 'perspective(1200px) rotateX(' + ((cy-y)/30) + 'deg) rotateY(' + ((x-cx)/30) + 'deg) translateY(-2px)';
            });
            c.addEventListener('mouseleave', () => { c.style.transform = 'none'; });
        }

        // LIGHTBOX
        function openLightbox(src) { 
            document.getElementById('lightbox-img').src = src; 
            document.getElementById('lightbox').classList.add('active'); 
        }
        function closeLightbox() { 
            document.getElementById('lightbox').classList.remove('active'); 
        }

        // ==========================================
        // ADVANCED DRAWING EDITOR LOGIC
        // ==========================================
        const drawCanv = document.getElementById('draw-canvas');
        const dCtx = drawCanv.getContext('2d', { willReadFrequently: true });
        
        let isDrawingPad = false;
        let brushColor = '#a78bfa';
        let brushSize = 8;
        let brushStyle = 'paintbrush';
        
        function initDraw() {
            drawCanv.width = drawCanv.clientWidth; 
            drawCanv.height = drawCanv.clientHeight;
            // Initialize with black background to ensure accurate downloads and img2img processing
            dCtx.fillStyle = '#000000';
            dCtx.fillRect(0, 0, drawCanv.width, drawCanv.height);
        }
        initDraw(); 
        window.addEventListener('resize', initDraw);

        // Toolbar Setup
        const sizeSlider = document.getElementById('draw-size');
        document.getElementById('draw-color').addEventListener('input', e => { brushColor = e.target.value; });
        sizeSlider.addEventListener('input', e => { brushSize = parseInt(e.target.value); });
        
        const styleBtns = document.querySelectorAll('.style-btn');
        for(let i = 0; i < styleBtns.length; i++) {
            const btn = Reflect.get(styleBtns, i);
            btn.addEventListener('click', e => {
                for(let j = 0; j < styleBtns.length; j++) Reflect.get(styleBtns, j).classList.remove('active');
                e.target.classList.add('active');
                brushStyle = e.target.getAttribute('data-style');
            });
        }

        // Mouse Wheel Size Adjustment (Only when hovering canvas)
        drawCanv.addEventListener('wheel', e => {
            e.preventDefault(); // Stop page scrolling
            if (e.deltaY > 0) brushSize = Math.max(1, brushSize - 2);
            else brushSize = Math.min(100, brushSize + 2);
            sizeSlider.value = brushSize;
        });

        drawCanv.addEventListener('mousedown', e => { 
            isDrawingPad = true; 
            dCtx.beginPath(); 
            dCtx.moveTo(e.offsetX, e.offsetY); 
        });
        
        drawCanv.addEventListener('mousemove', e => { 
            if(!isDrawingPad) return;

            dCtx.shadowBlur = 0; 
            dCtx.globalCompositeOperation = 'source-over';
            dCtx.globalAlpha = 1.0;
            
            if (brushStyle === 'eraser') {
                dCtx.lineWidth = brushSize * 2;
                dCtx.strokeStyle = '#000000'; // Paint black instead of destination-out to keep background safe for Img2Img
                dCtx.lineCap = 'round';
                dCtx.lineJoin = 'round';
                dCtx.lineTo(e.offsetX, e.offsetY);
                dCtx.stroke();
            } 
            else if (brushStyle === 'pencil') {
                dCtx.lineWidth = brushSize * 0.3;
                dCtx.globalAlpha = 0.4;
                dCtx.strokeStyle = brushColor;
                dCtx.lineCap = 'round';
                dCtx.lineJoin = 'round';
                dCtx.lineTo(e.offsetX, e.offsetY);
                dCtx.stroke();
            }
            else if (brushStyle === 'marker') {
                dCtx.lineWidth = brushSize;
                dCtx.strokeStyle = brushColor;
                dCtx.lineCap = 'square';
                dCtx.lineJoin = 'bevel';
                dCtx.globalCompositeOperation = 'screen'; 
                dCtx.lineTo(e.offsetX, e.offsetY);
                dCtx.stroke();
            }
            else if (brushStyle === 'airbrush') {
                // Scatter algorithm for true airbrush feel
                for (let i = 0; i < brushSize * 1.5; i++) {
                    const r = Math.random() * brushSize;
                    const angle = Math.random() * Math.PI * 2;
                    const px = e.offsetX + r * Math.cos(angle);
                    const py = e.offsetY + r * Math.sin(angle);
                    dCtx.fillStyle = brushColor;
                    dCtx.globalAlpha = 0.15;
                    dCtx.fillRect(px, py, 1.5, 1.5);
                }
            }
            else { // Paintbrush (Default)
                dCtx.lineWidth = brushSize;
                dCtx.strokeStyle = brushColor;
                dCtx.lineCap = 'round';
                dCtx.lineJoin = 'round';
                dCtx.lineTo(e.offsetX, e.offsetY);
                dCtx.stroke();
            }
        });
        
        window.addEventListener('mouseup', () => { isDrawingPad = false; });
        document.getElementById('btn-clear').addEventListener('click', () => {
            dCtx.globalCompositeOperation = 'source-over';
            dCtx.globalAlpha = 1.0;
            dCtx.fillStyle = '#000000';
            dCtx.fillRect(0, 0, drawCanv.width, drawCanv.height);
        });

        // Download PNG
        document.getElementById('btn-download').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'Picture_for_Cameron.png';
            link.href = drawCanv.toDataURL("image/png");
            link.click();
        });

        // ==========================================
        // GENUINE STABLE DIFFUSION API INTEGRATION
        // ==========================================
        document.getElementById('btn-diffusion').addEventListener('click', (e) => {
            const btn = e.target;
            if (btn.innerText === "Processing...") return;
            
            if (STABILITY_API_KEY === "YOUR_API_KEY_HERE") {
                alert("Please add your Stability API key to the script.");
                return;
            }

            btn.innerText = "Processing...";

            // 1. Start the visual animation
            let frame = 0;
            drawCanv.style.filter = 'url(#diffusion-filter) contrast(1.5) saturate(1.5)';
            
            function resolveDiffusion() {
                frame++;
                dCtx.fillStyle = 'rgba(0,0,0,0.05)'; 
                dCtx.fillRect(0, 0, drawCanv.width, drawCanv.height);
                if (frame < 60) requestAnimationFrame(resolveDiffusion);
            }
            requestAnimationFrame(resolveDiffusion);
            
            // 2. Create a compliant Off-Screen Canvas (1024x410 = 2.49 ratio)
            const offscreen = document.createElement('canvas');
            offscreen.width = 1024;
            offscreen.height = 410;
            const oCtx = offscreen.getContext('2d');
            // Draw your current drawing into the compliant resolution
            oCtx.drawImage(drawCanv, 0, 0, 1024, 410);

            // 3. Send the compliant Off-Screen blob
            offscreen.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("image", blob);
                formData.append("prompt", "A masterpiece");
                formData.append("control_strength", "0.6");
                formData.append("output_format", "png");

                try {
                    const response = await fetch("https://api.stability.ai/v2beta/stable-image/control/sketch", {
                        method: "POST",
                        headers: {
                            "Accept": "image/*",
                            "Authorization": "Bearer " + STABILITY_API_KEY
                        },
                        body: formData
                    });

                    if (response.status !== 200) {
                        const errText = await response.text();
                        console.error("API Error Data: ", errText);
                        throw new Error("Status " + response.status);
                    }

                    const resultBlob = await response.blob();
                    const objectUrl = URL.createObjectURL(resultBlob);

                    const genImg = new Image();
                    genImg.onload = () => {
                        dCtx.globalAlpha = 1.0;
                        dCtx.globalCompositeOperation = 'source-over';
                        // Draw result back to main canvas, scaling to fit UI
                        dCtx.drawImage(genImg, 0, 0, drawCanv.width, drawCanv.height);
                        
                        drawCanv.style.filter = "none";
                        btn.innerText = "Generate Img2Img";
                        URL.revokeObjectURL(objectUrl);
                    };
                    genImg.src = objectUrl;

                } catch (err) {
                    console.error(err);
                    alert("API Request Failed. Ensure aspect ratio is valid.");
                    drawCanv.style.filter = "none";
                    btn.innerText = "Generate Img2Img";
                }
            }, "image/png");
        });

        // ==========================================
        // HOVER-ONLY GRAY-SCOTT REACTION-DIFFUSION
        // ==========================================
        const bgCanv = document.getElementById('nca-bg-canvas');
        const bCtx = bgCanv.getContext('2d');
        
        let simW = 160; 
        let simH = 80; 
        let totalCells = simW * simH;
        
        let bufferA = new ArrayBuffer(totalCells * 4); let vA = new DataView(bufferA);
        let bufferB = new ArrayBuffer(totalCells * 4); let vB = new DataView(bufferB);
        let nextA = new ArrayBuffer(totalCells * 4); let nA = new DataView(nextA);
        let nextB = new ArrayBuffer(totalCells * 4); let nB = new DataView(nextB);

        function initRD() {
            const aspect = window.innerHeight / window.innerWidth;
            simH = Math.floor(simW * aspect);
            totalCells = simW * simH;
            
            bufferA = new ArrayBuffer(totalCells * 4); vA = new DataView(bufferA);
            bufferB = new ArrayBuffer(totalCells * 4); vB = new DataView(bufferB);
            nextA = new ArrayBuffer(totalCells * 4); nA = new DataView(nextA);
            nextB = new ArrayBuffer(totalCells * 4); nB = new DataView(nextB);

            for(let i = 0; i < totalCells; i++) {
                vA.setFloat32(i * 4, 1.0, true);
                vB.setFloat32(i * 4, 0.0, true);
            }
            const cx = Math.floor(simW / 2); const cy = Math.floor(simH / 2);
            for(let y = cy - 5; y < cy + 5; y++) {
                for(let x = cx - 5; x < cx + 5; x++) {
                    vB.setFloat32((y * simW + x) * 4, 1.0, true);
                }
            }
        }
        initRD(); window.addEventListener('resize', initRD);

        // Hover Seeding Interaction (No click required)
        window.addEventListener('mousemove', e => {
            // ONLY seed if hovering directly over the background space (not UI cards or editors)
            //const targetTag = e.target.tagName.toLowerCase();
            //if (targetTag !== 'body' && targetTag !== 'html' && targetTag !== 'main') return;

            const gx = Math.floor((e.clientX / window.innerWidth) * simW);
            const gy = Math.floor((e.clientY / window.innerHeight) * simH);
            const brush = 3;
            
            for(let y = -brush; y <= brush; y++) {
                for(let x = -brush; x <= brush; x++) {
                    const py = gy + y; const px = gx + x;
                    if(px >= 0 && px < simW && py >= 0 && py < simH && Math.hypot(x,y) < brush) {
                        vB.setFloat32(((py * simW) + px) * 4, 1.0, true); 
                    }
                }
            }
        });

        function stepRD() {
            const dA = 1.0, dB = 0.5, baseFeed = 0.054, baseK = 0.062;
            for(let y = 1; y < simH - 1; y++) {
                for(let x = 1; x < simW - 1; x++) {
                    const i = (y * simW + x) * 4;
                    let a = vA.getFloat32(i, true), b = vB.getFloat32(i, true);
                    let lapA = a * -1.0, lapB = b * -1.0;

                    const up = ((y - 1) * simW + x) * 4, down = ((y + 1) * simW + x) * 4;
                    const left = (y * simW + (x - 1)) * 4, right = (y * simW + (x + 1)) * 4;
                    lapA += (vA.getFloat32(up, true) + vA.getFloat32(down, true) + vA.getFloat32(left, true) + vA.getFloat32(right, true)) * 0.2;
                    lapB += (vB.getFloat32(up, true) + vB.getFloat32(down, true) + vB.getFloat32(left, true) + vB.getFloat32(right, true)) * 0.2;

                    const upL = ((y - 1) * simW + (x - 1)) * 4, upR = ((y - 1) * simW + (x + 1)) * 4;
                    const downL = ((y + 1) * simW + (x - 1)) * 4, downR = ((y + 1) * simW + (x + 1)) * 4;
                    lapA += (vA.getFloat32(upL, true) + vA.getFloat32(upR, true) + vA.getFloat32(downL, true) + vA.getFloat32(downR, true)) * 0.05;
                    lapB += (vB.getFloat32(upL, true) + vB.getFloat32(upR, true) + vB.getFloat32(downL, true) + vB.getFloat32(downR, true)) * 0.05;

                    const feed = baseFeed + (Math.sin(x * 0.05) * 0.002);
                    const k = baseK + (Math.cos(y * 0.05) * 0.002);
                    const ab2 = a * b * b;
                    
                    let newA = Math.max(0, Math.min(1, a + (dA * lapA - ab2 + feed * (1 - a))));
                    let newB = Math.max(0, Math.min(1, b + (dB * lapB + ab2 - (k + feed) * b)));

                    nA.setFloat32(i, newA, true);
                    nB.setFloat32(i, newB, true);
                }
            }
            const tempA = vA; vA = nA; nA = tempA;
            const tempB = vB; vB = nB; nB = tempB;
        }

        const tmpCanv = document.createElement('canvas');
        const tCtx = tmpCanv.getContext('2d');

        function renderRD() {
            tmpCanv.width = simW; tmpCanv.height = simH;
            const imgData = tCtx.createImageData(simW, simH);
            const dView = new DataView(imgData.data.buffer);
            
            for(let i = 0; i < totalCells; i++) {
                const bVal = vB.getFloat32(i * 4, true);
                const pixelIdx = i * 4;
                if (bVal > 0.1) {
                    const normalized = Math.min(1, bVal * 2.5);
                    dView.setUint8(pixelIdx, normalized * 249);     
                    dView.setUint8(pixelIdx + 1, normalized * 115); 
                    dView.setUint8(pixelIdx + 2, 22);               
                    dView.setUint8(pixelIdx + 3, normalized * 255); 
                } else {
                    dView.setUint8(pixelIdx + 3, 0); 
                }
            }

            tCtx.putImageData(imgData, 0, 0);
            
            bgCanv.width = window.innerWidth; bgCanv.height = window.innerHeight;
            bCtx.filter = 'drop-shadow(0 0 10px rgba(249, 115, 22, 0.5))';
            bCtx.imageSmoothingEnabled = true; 
            bCtx.clearRect(0, 0, bgCanv.width, bgCanv.height);
            bCtx.drawImage(tmpCanv, 0, 0, bgCanv.width, bgCanv.height);
        }

        function animateRDBgLoop() {
            for(let s = 0; s < 8; s++) { stepRD(); }
            renderRD();
            requestAnimationFrame(animateRDBgLoop);
        }
        animateRDBgLoop();

    </script>
</body>
