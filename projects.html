<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameron Halaby | Projects</title>
    
    <link rel="icon" href="./assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=cormorant-garamond:400,500,600,700|archivo:300,400,500" rel="stylesheet" />

    <style>
        :root {
            --bg-color: #ecece9;
            --text-color: #111111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100vw; min-height: 100vh;
            background-color: var(--bg-color); font-family: 'Archivo', sans-serif;
            color: var(--text-color); -webkit-font-smoothing: antialiased; overflow-x: hidden;
            transition: background-color 2s ease, color 2s ease;
        }

        /* NAVIGATION */
        .site-header { position: fixed; top: 0; width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header-logo, .header-nav a { text-decoration: none; font-family: 'Archivo', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; color: var(--text-color); transition: opacity 0.3s; }
        .header-nav a:hover, .header-logo:hover { opacity: 0.5; }
        .header-nav { display: flex; gap: 40px; }

        /* AUDIO PLAYER */
        .audio-player { position: fixed; bottom: 30px; right: 40px; z-index: 9999; font-family: 'Archivo', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-color); opacity: 0; transition: opacity 1.5s ease; }
        .audio-player a { color: inherit; text-decoration: none; }
        .audio-player u { text-underline-offset: 4px; text-decoration-thickness: 1px; transition: color 0.3s ease; }

        /* MINIMAL PAGE LAYOUT */
        .page-container { padding: 150px 10% 100px 10%; min-height: 90vh; }
        .page-title { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 500; margin-bottom: 10px; color: var(--text-color); }
        .page-subtitle { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-color); opacity: 0.6; margin-bottom: 60px; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        
        /* OBSIDIAN CARDS */
        .obs-card { background: linear-gradient(145deg, #2b2b2e 0%, #161618 100%); border-radius: 18px; padding: 30px; position: relative; box-shadow: 0 35px 65px rgba(0,0,0,0.25), 0 10px 20px rgba(0,0,0,0.15); transform-style: preserve-3d; transition: transform 0.2s ease-out; text-decoration: none; }
        .obs-card::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 165, 0, 0.7), transparent); box-shadow: 0 2px 12px rgba(255, 165, 0, 0.5); z-index: 2; }
        .obs-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; transform: translateZ(20px); }
        .obs-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #a78bfa, #7c3aed); border-radius: 12px; }
        .obs-title { color: #ffffff; font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; }
        .obs-list { display: flex; flex-direction: column; gap: 10px; transform: translateZ(10px); }
        .obs-item { background: #f4f4f6; padding: 12px 18px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; color: #111; font-weight: 500; font-size: 0.9rem; box-shadow: 0 -2px 4px -2px rgba(0, 200, 255, 0.7), 0 2px 4px -2px rgba(255, 120, 0, 0.7); }

        /* FOOTER */
        .site-footer { border-top: 1px solid rgba(128,128,128,0.2); color: var(--text-color); opacity: 0.6; padding: 40px 10%; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="site-header">
        <a href="index.html" class="header-logo">C. Halaby</a>
        <div class="header-nav">
            <a href="projects.html" style="opacity: 0.5;">Projects</a>
            <a href="art.html">Art</a>
            <a href="music.html">Music</a>
        </div>
    </nav>

    <div class="audio-player" id="audio-player">
        Playing <a href="music.html"><u id="track-name">Loading...</u></a>
    </div>

    <main class="page-container">
        <h1 class="page-title">Projects</h1>
        <p class="page-subtitle">System Architecture & Engineering</p>

        <div class="card-grid">
            <div class="obs-card">
                <div class="obs-header">
                    <div class="obs-icon" style="background: linear-gradient(135deg, #60a5fa, #2563eb);"></div>
                    <h3 class="obs-title">Geospatial NeRF</h3>
                </div>
                <div class="obs-list">
                    <div class="obs-item"><span>3D Reconstruction Data</span></div>
                </div>
            </div>

            <div class="obs-card">
                <div class="obs-header">
                    <div class="obs-icon" style="background: linear-gradient(135deg, #34d399, #059669);"></div>
                    <h3 class="obs-title">Semantic Course Map</h3>
                </div>
                <div class="obs-list">
                    <div class="obs-item"><span>UGA Landscape Mapping</span></div>
                </div>
            </div>

            <div class="obs-card">
                <div class="obs-header">
                    <div class="obs-icon" style="background: linear-gradient(135deg, #fbbf24, #d97706);"></div>
                    <h3 class="obs-title">EEG ML</h3>
                </div>
                <div class="obs-list">
                    <div class="obs-item"><span>Canine Brain Scan (Inky)</span></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Cameron Halaby. No Rights Reserved.</p>
        <p id="dynamic-date"></p>
    </footer>

    <script>
        // DYNAMIC THEME
        function updateTheme() {
            const d = new Date(), h = d.getHours() + d.getMinutes() / 60;
            const intensity = (Math.cos((h - 12) / 24 * Math.PI * 2) + 1) / 2;
            
            // Smoothly transition the background
            const r = Math.round(5 + (236-5) * intensity);
            const g = Math.round(5 + (236-5) * intensity);
            const b = Math.round(8 + (233-8) * intensity);
            
            // Sharp transition for text to guarantee contrast
            const isDay = intensity > 0.5;
            const textR = isDay ? 17 : 244;
            const textG = isDay ? 17 : 244;
            const textB = isDay ? 17 : 245;

            document.documentElement.style.setProperty('--bg-color', 'rgb(' + r + ',' + g + ',' + b + ')');
            document.documentElement.style.setProperty('--text-color', 'rgb(' + textR + ',' + textG + ',' + textB + ')');
        }
        setInterval(updateTheme, 60000); updateTheme();

        // FOOTER DATE
        const d = new Date(), months =["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        document.getElementById('dynamic-date').innerText = `Updated ${months[d.getMonth()]} ${d.getFullYear()}`;

        // AUDIO PLAYER LOGIC
        const playlist = new Array(
            { name: "SoundHelix_01", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "SoundHelix_02", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
        );
        let currentTrack = 0, hasStartedAudio = false, isFadingOut = false, fadeInterval;
        const fadeDurationMs = 2000, audioObj = new Audio(), playerUI = document.getElementById('audio-player'), trackNameUI = document.getElementById('track-name');

        function playTrack(index) {
            currentTrack = index; audioObj.src = playlist[currentTrack].src; trackNameUI.innerText = playlist[currentTrack].name;
            audioObj.volume = 0; isFadingOut = false;
            audioObj.play().then(() => {
                playerUI.style.opacity = 1; clearInterval(fadeInterval);
                fadeInterval = setInterval(() => { if (audioObj.volume < 0.95) audioObj.volume += 0.05; else { audioObj.volume = 1; clearInterval(fadeInterval); } }, fadeDurationMs / 20);
            }).catch(e => console.log("Audio prevented."));
        }
        audioObj.addEventListener('timeupdate', () => {
            if (!isFadingOut && audioObj.duration && (audioObj.duration - audioObj.currentTime) <= (fadeDurationMs / 1000)) {
                isFadingOut = true; clearInterval(fadeInterval);
                fadeInterval = setInterval(() => { if (audioObj.volume > 0.05) audioObj.volume -= 0.05; else { audioObj.volume = 0; clearInterval(fadeInterval); } }, fadeDurationMs / 20);
            }
        });
        audioObj.addEventListener('ended', () => { playTrack((currentTrack + 1) % playlist.length); });
        document.body.addEventListener('click', () => { if(!hasStartedAudio) { hasStartedAudio = true; playTrack(currentTrack); } }, { once: true });

        // 3D CARD TILT
        document.querySelectorAll('.obs-card').forEach(c => {
            c.addEventListener('mousemove', e => {
                const r = c.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top, cx = r.width / 2, cy = r.height / 2;
                c.style.transform = `perspective(1200px) rotateX(${(cy-y)/30}deg) rotateY(${(x-cx)/30}deg) translateY(-2px)`;
            });
            c.addEventListener('mouseleave', () => c.style.transform = 'none');
        });
    </script>
</body>
</html>
