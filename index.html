<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameron Halaby | Projects</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --glass-bg: rgba(25, 27, 30, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --border-light: rgba(255, 255, 255, 0.08);
            
            /* These update via JS to track the mouse */
            --mouse-x: 50vw;
            --mouse-y: 50vh;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
            color: var(--text-main);
        }

        /* 
         * BACKGROUND PATTERN
         * A subtle dot matrix that interacts with the lighting 
         */
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: -2;
        }

        /* 
         * MOUSE LIGHTING EFFECT 
         * A glowing orb that follows the mouse, illuminating the background
         */
        .cursor-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y), 
                rgba(120, 160, 255, 0.15), /* Soft blue-ish light */
                transparent 40%
            );
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
            z-index: 10;
        }

        /* Top Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            transform: translateZ(60px);
            pointer-events: none;
        }

        .name-title {
            font-family: 'Georgia', Times, serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -1px;
            /* Sleek silver/metallic gradient instead of the chromatic split */
            background: linear-gradient(135deg, #ffffff 0%, #a0a5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            margin-top: 10px;
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 
         * THE VAULT WINDOW
         * Frosted glassmorphism effect (Refraction)
         */
        .app-window {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 480px;
            border-radius: 24px;
            padding: 25px 25px 35px 15px;
            border: 1px solid var(--border-light);
            position: relative;
            display: flex;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Surface Reflection Sheen on the vault */
        .app-window::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y), 
                rgba(255, 255, 255, 0.05), 
                transparent 40%
            );
            pointer-events: none;
            z-index: 5;
        }

        /* Left Sidebar Icons */
        .sidebar {
            width: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-top: 10px;
            border-right: 1px solid var(--border-light);
            margin-right: 20px;
            z-index: 10;
        }

        .sidebar-icon {
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            transition: background 0.3s;
        }

        /* Project List */
        .project-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        /* 
         * PROJECT CARDS 
         */
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            padding: 16px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(20px);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.3s;
            /* Default shadow, overridden by JS dynamically based on mouse position */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .project-item:hover {
            transform: translateZ(45px) translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .project-name {
            font-weight: 500;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        .project-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-family: 'Courier New', Courier, monospace;
        }

        .file-icon {
            opacity: 0.5;
        }

        .file-ext {
            color: var(--text-muted);
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div class="background-pattern"></div>
    <div class="cursor-light"></div>

    <div class="container">
        
        <div class="header">
            <h1 class="name-title">Cameron Halaby</h1>
            <p class="subtitle">Projects Vault</p>
        </div>

        <main class="app-window" id="vault-window">
            
            <div class="sidebar">
                <div class="sidebar-icon" style="border-radius: 50%; opacity: 0.5;"></div>
                <div class="sidebar-icon" style="height: 12px; width: 18px; opacity: 0.3;"></div>
                <div class="sidebar-icon" style="height: 18px; width: 18px; opacity: 0.2;"></div>
                <div class="sidebar-icon" style="height: 18px; width: 18px; opacity: 0.1;"></div>
            </div>

            <div class="project-list">
                
                <a href="#" class="project-item">
                    <span class="project-name">Project 1</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 2</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 3</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 4</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 5</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 6</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 7</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

                <a href="#" class="project-item">
                    <span class="project-name">Project 8</span>
                    <div class="project-meta">
                        <span class="file-icon">📄</span>
                        <span class="file-ext">.MD FILE</span>
                    </div>
                </a>

            </div>
        </main>
    </div>

    <script>
        const vaultWindow = document.getElementById('vault-window');
        const container = document.querySelector('.container');
        const projectItems = document.querySelectorAll('.project-item');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // 1. UPDATE LIGHTING POSITION
            // This updates CSS variables to move the global light source and surface reflection
            document.documentElement.style.setProperty('--mouse-x', `${x}px`);
            document.documentElement.style.setProperty('--mouse-y', `${y}px`);

            // 2. 3D TILT EFFECT
            // Calculate tilt based on distance from center of screen
            let xAxis = (window.innerWidth / 2 - x) / 50;
            let yAxis = (window.innerHeight / 2 - y) / 50;
            vaultWindow.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            container.style.transform = `translateX(${-xAxis}px) translateY(${-yAxis}px)`;

            // 3. DYNAMIC SHADOWS FOR INDIVIDUAL CARDS
            // Casts shadows away from the mouse to create physical depth
            projectItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                const itemCenterX = rect.left + rect.width / 2;
                const itemCenterY = rect.top + rect.height / 2;
                
                // Calculate distance vector from card to mouse
                const distanceX = (itemCenterX - x) / 10;
                const distanceY = (itemCenterY - y) / 10;

                // Apply dynamic drop shadow opposite to the light source
                item.style.boxShadow = `${distanceX}px ${distanceY}px 15px rgba(0,0,0,0.5)`;
            });

            // Dynamic shadow for the main vault window
            const vaultRect = vaultWindow.getBoundingClientRect();
            const vaultCenterX = vaultRect.left + vaultRect.width / 2;
            const vaultCenterY = vaultRect.top + vaultRect.height / 2;
            const vaultDistX = (vaultCenterX - x) / 15;
            const vaultDistY = (vaultCenterY - y) / 15;
            
            vaultWindow.style.boxShadow = `${vaultDistX}px ${vaultDistY}px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1)`;
        });

        // Reset elements when the mouse leaves the screen entirely
        document.addEventListener('mouseleave', () => {
            vaultWindow.style.transform = `rotateY(0deg) rotateX(0deg)`;
            container.style.transform = `translateX(0px) translateY(0px)`;
            
            vaultWindow.style.boxShadow = `0 25px 50px rgba(0,0,0,0.5)`;
            projectItems.forEach(item => {
                item.style.boxShadow = `0 10px 20px rgba(0,0,0,0.3)`;
            });
        });
    </script>
</body>
</html>
