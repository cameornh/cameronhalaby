<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameron Halaby</title>
    <style>
        :root {
            --bg: #050507;
            --accent: #fff;
            --meta: #444;
            --dim-light: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--accent);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            height: 100%;
            cursor: none; /* Custom light source replaces cursor */
        }

        /* --- THE LIGHTING CANVAS --- */
        #light-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* --- UI OVERLAY --- */
        .interface {
            position: relative;
            z-index: 10;
            padding: 4vw;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            grid-column: 1 / -1;
            margin-bottom: 10vh;
        }

        h1 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            font-weight: 300;
            margin: 0;
            color: var(--accent);
            opacity: 0.8;
        }

        /* --- CAROUSEL (Main Observation) --- */
        .carousel-container {
            grid-column: 1 / 9;
            aspect-ratio: 16 / 9;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
            font-size: 0.7rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: var(--meta);
        }

        .slide.active { opacity: 1; }

        /* --- THE FOUR SQUARES (Optical Obstacles) --- */
        .square-grid {
            grid-column: 9 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
        }

        .obstacle {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: var(--meta);
            text-transform: uppercase;
            position: relative;
            transition: border 0.3s ease;
        }

        /* --- PROJECT LIST --- */
        .projects-wrap {
            grid-column: 1 / 5;
            margin-top: 5vh;
        }

        .project-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            position: relative;
        }

        .project-item:hover {
            padding-left: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.4);
        }

        .project-name {
            font-size: 1.2rem;
            font-weight: 300;
        }

        .project-meta {
            font-size: 0.7rem;
            color: var(--meta);
        }

        /* --- LIGHT EMITTER (CURSOR) --- */
        #emitter {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.5);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .carousel-container, .square-grid, .projects-wrap {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>

    <div id="emitter"></div>
    <canvas id="light-canvas"></canvas>

    <div class="interface">
        <header>
            <h1>Cameron Halaby</h1>
        </header>

        <!-- Dynamic Carousel -->
        <div class="carousel-container obstacle" id="main-portal">
            <div class="slide active">Observation_Node_01</div>
            <div class="slide">Observation_Node_02</div>
            <div class="slide">Observation_Node_03</div>
        </div>

        <!-- Four Square Obstacles -->
        <div class="square-grid">
            <div class="obstacle">Sensor_A</div>
            <div class="obstacle">Sensor_B</div>
            <div class="obstacle">Sensor_C</div>
            <div class="obstacle">Sensor_D</div>
        </div>

        <!-- Projects -->
        <div class="projects-wrap">
            <div class="project-item">
                <span class="project-name">Project 1</span>
                <span class="project-meta">2024 / TRACE</span>
            </div>
            <div class="project-item">
                <span class="project-name">Project 2</span>
                <span class="project-meta">2023 / SCATTER</span>
            </div>
            <div class="project-item">
                <span class="project-name">Project 3</span>
                <span class="project-meta">2023 / REFRACT</span>
            </div>
            <div class="project-item">
                <span class="project-name">Project 4</span>
                <span class="project-meta">2022 / PHASE</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('light-canvas');
        const ctx = canvas.getContext('2d');
        const emitter = document.getElementById('emitter');
        let obstacles = [];
        let mouse = { x: -1000, y: -1000 };

        // Handle Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Map the DOM elements as physical obstacles for the light engine
            updateObstacles();
        }

        function updateObstacles() {
            const elements = document.querySelectorAll('.obstacle, .project-item');
            obstacles = Array.from(elements).map(el => {
                const rect = el.getBoundingClientRect();
                return {
                    x: rect.left,
                    y: rect.top,
                    w: rect.width,
                    h: rect.height,
                    center: { x: rect.left + rect.width/2, y: rect.top + rect.height/2 }
                };
            });
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            emitter.style.left = mouse.x + 'px';
            emitter.style.top = mouse.y + 'px';
        });

        // Simple Raycasting Logic for Geometric Shadows
        function drawShadows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ambient background glow
            const ambient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 800);
            ambient.addColorStop(0, 'rgba(255,255,255,0.08)');
            ambient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = ambient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            obstacles.forEach(ob => {
                // Calculate vector from light to obstacle
                const points = [
                    {x: ob.x, y: ob.y},
                    {x: ob.x + ob.w, y: ob.y},
                    {x: ob.x + ob.w, y: ob.y + ob.h},
                    {x: ob.x, y: ob.y + ob.h}
                ];

                ctx.fillStyle = 'rgba(0,0,0,0.95)';
                ctx.beginPath();
                
                // For each edge of the rectangle, project a shadow volume
                points.forEach((p, i) => {
                    const nextP = points[(i + 1) % 4];
                    
                    // Project points away from mouse
                    const angle1 = Math.atan2(p.y - mouse.y, p.x - mouse.x);
                    const angle2 = Math.atan2(nextP.y - mouse.y, nextP.x - mouse.x);
                    
                    const dist = 3000; // Project shadows into "infinity"
                    
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(angle1) * dist, p.y + Math.sin(angle1) * dist);
                    ctx.lineTo(nextP.x + Math.cos(angle2) * dist, nextP.y + Math.sin(angle2) * dist);
                    ctx.lineTo(nextP.x, nextP.y);
                });
                ctx.fill();

                // Add a "specular" hit on the edge facing the mouse
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(ob.x, ob.y, ob.w, ob.h);
            });

            // Chromatic Aberration - Red/Blue dispersion fringes
            ctx.globalCompositeOperation = 'screen';
            drawFringe(2, 'rgba(255,0,0,0.05)');
            drawFringe(-2, 'rgba(0,100,255,0.05)');
            ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(drawShadows);
        }

        function drawFringe(offset, color) {
            ctx.fillStyle = color;
            obstacles.forEach(ob => {
                const angle = Math.atan2(ob.center.y - mouse.y, ob.center.x - mouse.x);
                ctx.save();
                ctx.translate(Math.cos(angle) * offset, Math.sin(angle) * offset);
                ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
                ctx.restore();
            });
        }

        // Simple Carousel
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);

        // Init
        resize();
        drawShadows();
        // Periodically update obstacle positions in case of layout shifts
        setInterval(updateObstacles, 2000);

    </script>
</body>
</html>
